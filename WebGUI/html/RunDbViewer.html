			var _XML_RUNDBVIEWER_ENTRY_RUN_CONTEXT_NAME	 			= "context_name"
			var _XML_RUNDBVIEWER_ENTRY_RUN_CONTEXT_VERSION	 		= "context_version"
			var _XML_RUNDBVIEWER_ENTRY_RUN_ONLINE_SOFTWARE_VERSION	= "online_software_version"
			var _XML_RUNDBVIEWER_ENTRY_RUN_SHIFTER_NOTE				= "shifter_note"

			//=====================================================================================
			//init called once body has loaded
			function init()
			{
				Debug.log("init()");

				if(DesktopContent._windowMessagingInactive) //assume in standalone mode
				{
					Debug.log("Standalone mode detected -- Enabling navigation prompt");
					// Enable navigation prompt
					//	(to prevent accidental/back/forward/nav leaving the page) "Leave page?" on chrome
					window.onbeforeunload = function() {
						return true;
					};

					window.parent.document.title = "ots run info database";
				}

				//init area elements
				for(var i=0;i<_AREAS.length;++i)
					_areaEls[i] = document.getElementById(_AREAS[i] + 'Area');

				//get default run type from url
				//setActiveSelection(DesktopContent.getParameter(1));
				_defaultRunType = DesktopContent.getDesktopWindowParameter(0,"runType");
				if (_defaultRunType == "DEFAULT") _defaultRunType = "";
				setActiveSelection(_defaultRunType);

				window.onresize = redrawRunDbViewer;

				_runInfoPluginName = DesktopContent.getDesktopWindowParameter(0,"runInfoPluginName");
				_runInfoPluginUID = DesktopContent.getDesktopWindowParameter(0,"runInfoPluginUID");

				//Retrive run type list from database:
				DesktopContent.XMLHttpRequest("Request?RequestType=GetRunTypeList", //update category list
						"", handleRunTypeListRequest, _runTypeArray);

				makeRunTypeSelect();
				redrawRunDbViewer();
			} //end init()

			//=====================================================================================
			//makeRunTypeSelect ~
			function makeRunTypeSelect()
			{
				// 1. Create label
				const label = document.createElement("label");
				label.setAttribute("for", "runType");
				label.textContent = "Select or enter a run type ";

				// 2. Create input with datalist
				const input = document.createElement("input");
				input.setAttribute("list", "runTypes");
				input.setAttribute("id", "runType");
				input.setAttribute("name", "runType");

				// 3. Create datalist
				const datalist = document.createElement("datalist");
				datalist.id = "runTypes";

				const runTypes = [
					  "production"
					, "calo"
					, "tracker"
					, "crv"
					, "VST"
					, "tracker VST"
					, "calorimeter VST"
					, "crv VST"
					, "stm VST"
					, "EXT VST"
					, "DAQ debugging"
					, "tracker & calorimeter VST"
					, "tracker & crv VST"
					, "calo VST"
					, "tracker VST"
					, "crv VST"];

				runTypes.forEach(type => {
					const option = document.createElement("option");
					option.value = type;
					datalist.appendChild(option);
				});

				// 4. Event listeners
				input.addEventListener("change", () => {
					const value = input.value.trim();
					if (runTypes.includes(value)) {
						Debug.log("Selected:", value);
						performRunTypeSelection(value);
					}
				});

				input.addEventListener("keydown", (event) => {
				if (event.key === "Enter") {
					const value = input.value.trim();
					if (value !== "") {
						Debug.log("ENTER pressed on:", value);
						performRunTypeSelection(value);
					}
					else {
						Debug.log("ENTER pressed on empty: run type has default value");
						performRunTypeSelection(_defaultRunType);
					}
				}
				});

				// 5. Append everything to the page
				const container = document.getElementById("selectionArea");
				container.appendChild(label);
				container.appendChild(input);
				container.appendChild(datalist);
			} //end makeRunTypeSelect()

			//=====================================================================================
			//performRunTypeSelection ~
			function performRunTypeSelection(runType) {
				console.log("Action triggered for run type: " + runType);
				setActiveSelection(runType);
				refreshRunDbViewer(); //and refresh now!
			} //end performRunTypeSelection()

			//=====================================================================================
			//setActiveSelection ~
			function setActiveSelection(runType)
			{
				Debug.log("RunDbViewer setActiveSelection to " + runType);

				_activeRunType = runType;

				var str = "";
				str += "<center>";
				str += "<div id='runTypeHeaderLabel'>";
				if(!_activeRunType || _activeRunType == "")
				{	_activeRunType = ""; str += "No run type filter Set"; 	}
				else
					str += "<font color='white'>Active run type filter is </font><font style='color:orange'>" + _activeRunType + "</font>";
				str += "</div>";
				str += "</center>";

				currentSelectionHeader.innerHTML = str;
			} //end setActiveSelection()

			//=====================================================================================
			//redrawRunDbViewer ~
			function redrawRunDbViewer()
			{
				Debug.log("RunDbViewer redrawRunDbViewer to  " + window.innerWidth + " - " + window.innerHeight);

				var w = DesktopContent.getWindowWidth();
				if(w < 600) w = 600; //prevent super squeeze

				for(var i=0;i<_AREAS.length;++i)
				{
					_areaEls[i].style.display = "block";

					_areaEls[i].style.left = _MARGIN + "px";
					_areaEls[i].style.width = (w - _MARGIN*2) + "px";
				}
			} //end redrawRunDbViewer()

			//=====================================================================================
			//convertForClient ~
			//	replace server reserved characters with html equivalents
			//	reserved: ", ', &, <, >, newline, double-space
			function convertForClient(entry)
			{
				//replace special HTML chars-----------
				return entry
					 .replace(/%26/g, "&amp;")  			//&
					 .replace(/%3C/g, "&lt;") 				//<
					 .replace(/%3E/g, "&gt;")				//>
					 .replace(/%22/g, "&quot;")				//"
					 .replace(/%27/g, "&#039;")				//'
					 .replace(/\t/g, "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;")//tab
					 .replace(/%0A%0D/g, "<br>")			//newline
					 .replace(/&#010;/g, "<br>")			//newline
					 .replace(/\n/g, 	 "<br>")			//newline
					 .replace(/%20%20/g, "&nbsp;&nbsp;");	//space
			} //end convertForClient()

			//=====================================================================================
			//handleRunTypeListRequest ~~
			function handleRunTypeListRequest(req, preselectsArr)
			{
				_runTypeArray = req.responseXML.getElementsByTagName(_XML_RUNTYPE_LIST);

				redrawRunDbViewer(); //setup window divs based on admin
				refreshRunDbViewer(); //refresh rundbviewer, by default start with today for one day
			} //end handleRunTypeListRequest()

			//=====================================================================================
			//toggleAutoRefresh ~~
			var _autoRefreshTimer = 0;
			function toggleAutoRefresh()
			{
				Debug.log("RunDbViewer toggleAutoRefresh()");
				if(_autoRefreshTimer) window.clearTimeout(_autoRefreshTimer);
				_autoRefreshTimer = 0;

				if(autoRefreshLink.innerText.indexOf("off") > 0)
				{ //then turn on
					autoRefreshLink.innerText = "Auto-refresh is on";

					_autoRefreshTimer = window.setTimeout(refreshRunDbViewer, 30 * 1000 /* 30 seconds */);
					refreshRunDbViewer(); //and refresh now!
				}
				else //turn off
				{
					autoRefreshLink.innerText = "Auto-refresh is off";
				}

			} //end toggleAutoRefresh()

			//=====================================================================================
			//refreshRunDbViewer ~~
			//	generates request for rundbviewer based on dayIndex and duration
			//		dayIndex = 0 for today, 1 for yesterday, etc
			//		duration is number of days in past to request
			//		if either is undefined, last request value is used
			//	request is looking for time_t seconds
			var _delayRunDbViewerRequestTimer = 0;
			function refreshRunDbViewer(dayIndex,duration)
			{
				Debug.log("RunDbViewer refreshRunDbViewer " + dayIndex + " - " + duration);

				if(typeof dayIndex != "undefined")
					_refreshDayIndex = dayIndex; //get day index integer
				if(typeof duration != "undefined")
					_refreshDuration = duration;
				Debug.log("RunDbViewer refreshRunDbViewer " + _refreshDayIndex + " - " + _refreshDuration);
				var reqDate = (((((new Date()).getTime())/(1000*60*60*24)) | 0) - _refreshDayIndex)*24*60*60;
				if(_mostRecentDayIndex < 0) //most recent day request
					reqDate = 0; //to indicate get most recent day

				Debug.logv({_activeRunType});

				//always show date
				refreshDateDisplay();

				Debug.log("RunDbViewer refreshRunDbViewer start timer");
				if(_delayRunDbViewerRequestTimer) window.clearTimeout(_delayRunDbViewerRequestTimer);
				_delayRunDbViewerRequestTimer = window.setTimeout(function()
					{
						if(_delayRunDbViewerRequestTimer) window.clearTimeout(_delayRunDbViewerRequestTimer);
						_delayRunDbViewerRequestTimer = 0;

						DesktopContent.XMLHttpRequest("Request?RequestType=RefreshRunDbViewer", 		//update category list
								"Date=" + reqDate +
								"&Duration=" + _refreshDuration +
								"&runInfoPluginName=" + _runInfoPluginName +
								"&runInfoPluginUID=" + _runInfoPluginUID +
								"&runTypeFilter=" + encodeURIComponent(_activeRunType),  //* for all, if "" go with active run type
								handleRefreshRunDbViewer);

					}, 500 /* ms */ ); //end delay handler

			} //end refreshRunDbViewer()

			//=====================================================================================
			//handleRefreshRunDbViewer ~~
			//	receives entries from oldest to newest, but display
			//	from newest to oldest
			function handleRefreshRunDbViewer(req)
			{
				Debug.log("RunDbViewer handleRefreshRunDbViewer", req.responseText.length);

				if(_autoRefreshTimer)  //reset interval, in case of long response times
				{
					window.clearTimeout(_autoRefreshTimer);
					_autoRefreshTimer = window.setTimeout(refreshRunDbViewer, 30 * 1000 /* 30 seconds */);
				}

				var rundbviewerStatus;
				if((rundbviewerStatus = DesktopContent.getXMLValue(req,_XML_STATUS)) !="1") //failed
					document.getElementById("rundbviewerDiv").innerHTML = "<div style='color:rgb(255,183,74)'>" + rundbviewerStatus + "</div>";
				else
				{
					var mostRecentDayStr = DesktopContent.getXMLValue(req,_XML_MOST_RECENT_DAY);
					Debug.log("RunDbViewer handleRefreshRunDbViewer " + mostRecentDayStr);
					if(_mostRecentDayIndex < 0) //never set, so set refresh day to returned most recent day
						_refreshDayIndex = parseInt(mostRecentDayStr);
					_mostRecentDayIndex = parseInt(mostRecentDayStr);
					var mostRecentDayEl = document.getElementById("rundbviewerHeader").getElementsByTagName("a")[0];
					if(_mostRecentDayIndex == 0)
						mostRecentDayEl.innerHTML = "Today";
					else if(_mostRecentDayIndex == 1)
						mostRecentDayEl.innerHTML = "Yesterday";
					else
						mostRecentDayEl.innerHTML = "Most Recent Day";

					refreshDateDisplay();

					//extract rundbviewer display
					var entries = req.responseXML.getElementsByTagName(_XML_RUNDBVIEWER_ENTRY);

					var rundbviewerEl = document.getElementById("rundbviewerDiv");
					rundbviewerEl.innerHTML = "";

					//display from newest to oldest
					console.log("Run DB Viewer entries.length " + entries.length);

					for(var i=entries.length-1;i>=0;--i)
						displayRunDbViewerEntry(rundbviewerEl,entries[i]);

					//add helper to move starting date back
					var tmp = document.createElement("div");
					tmp.setAttribute("id", "clearDiv");
					rundbviewerEl.appendChild(tmp);
					var tmp = document.createElement("div");
					tmp.innerText = "Note: If you are expecting more entries for the selected critieria, try moving the selected date back in time.";
					rundbviewerEl.appendChild(tmp);
				}

				 //schedule next update
				if(_rundbviewerUpdateTimer)
					clearTimeout(_rundbviewerUpdateTimer);
				//_rundbviewerUpdateTimer = window.setTimeout(refreshRunDbViewer,_REFRESH_INTERVAL);  //NOTE: if want refresh every period, uncomment.
																								//currently user must use manual refresh
				redrawRunDbViewer(); //in case of new scroll bars
			} //end handleRefreshRunDbViewer()

			//=====================================================================================
			//replaceBrWithSpace ~~
			// Replace all <br> tags with a space
			function replaceBrWithSpace(el)
			{
				el.isBrReplaced = "true";
				el.querySelectorAll('br').forEach(br => {
					const space = document.createTextNode(' ');
					space.isBr = "true"; // Mark it for restoration
					br.replaceWith(space);
				});

				var condensedWidth = currentSelectionHeader.offsetWidth;
				el.setAttribute("style", "white-space: nowrap; overflow-x: hidden; width: " +
					(condensedWidth-130) + "px;" +
					"padding-top: 2px; padding-bottom: 10px; color: rgb(216 189 139);");
			} //end replaceBrWithSpace()

			//=====================================================================================
			//restoreBr ~~
			// Restore <br> tags
			function restoreBr(el)
			{
				el.isBrReplaced = undefined;
				el.childNodes.forEach(node => {
					if (node.nodeType === Node.TEXT_NODE && node.data.trim() === '' && node.isBr === "true") {
						const br = document.createElement('br');
						node.replaceWith(br);
					}
				});
				var condensedWidth = currentSelectionHeader.offsetWidth;
				el.setAttribute("style", "overflow-x: auto; width: " +
					(condensedWidth-130) + "px;" +
					"padding-top: 20px; padding-bottom: 20px; color: rgb(252 217 164);");
				el.style.display = "none";
			} //end restoreBr()

			//=====================================================================================
			//refreshDateDisplay ~~
			function refreshDateDisplay()
			{
				Debug.log("refreshDateDisplay()",_refreshDayIndex);
				var reqTime = (new Date()).getTime() - _refreshDayIndex*24*60*60*1000; //in ms
				var dateObj = new Date(reqTime);

				var displayDate = (dateObj.getMonth()+1) + "/" + dateObj.getDate() + "/" + dateObj.getFullYear();
				document.getElementById("rundbviewerCalendarDateDisplay").innerHTML =
					"<a href='Javascript:;' onmouseup='refreshRunDbViewer(" + _refreshDayIndex + ");'>(" +
					displayDate + ")</a>";

				//decorate selection properly
				var aArr = document.getElementById("rundbviewerHeader").getElementsByTagName("a");
				//all of the links in the rundbviewer header (0=today, 1=yesterday,.. 6=max days) max days before might be 6 or 7
				for(var i=0;i<aArr.length;++i)
					if(i < 1 && (reqTime == 0 || _refreshDayIndex == _mostRecentDayIndex))
						aArr[i].setAttribute("class", "rundbviewerSelection");
					else if(i == 1 && !(reqTime == 0 || _refreshDayIndex == _mostRecentDayIndex))
						aArr[i].setAttribute("class", "rundbviewerSelection");
					else if(i > 1 && i < 15 && aArr[i].innerText == _refreshDuration) //durations
						aArr[i].setAttribute("class", "rundbviewerSelection");
					else
						aArr[i].setAttribute("class", "rundbviewerNotSelected");
				//Debug.log("RunDbViewer " + i + ":" + aArr[i].innerHTML);
			} //end refreshDateDisplay()

				//table.appendChild(entryText);

				//entry.getElementsByTagName(_XML_RUNDBVIEWER_ENTRY_RUN_ONLINE_SOFTWARE_VERSION)[0].getAttribute("value")) + "</td>";

				entryText = document.createElement("tr");

				var subsystemInfo = entry.getElementsByTagName(_XML_RUNDBVIEWER_ENTRY_SUBSYSTEM_CONFIG_RECORD)[0].getAttribute("value");

				var sanitize = function(xml) {
				return xml.replace(/(\s+)([^\s=<>\/]+)\s*=\s*([^"'\s=<>`][^\s<>]*)/g,
					(m, ws, name, val) => `${ws}${name}="${val.replace(/"/g, '&quot;')}"`
				);
				}

				var parseConfigRecord = function(record){
					const obj = {};

					// attributes
					for (let a of record.attributes){
						obj[a.name]=a.value;
					}

					// children
					for (let child of record.children){
						const key = child.tagName;
						const value = child.textContent.trim();
						obj[key] = obj[key] ? [].concat(obj[key], value) : value;
					}

					return obj;
				}

				var tableFromObj = function(o, i){
					let t = "<tr class='subsystemRow'>";
					let fr = "<tr class='subsystemRow'>";

					const entries = Object.entries(o);

					for (let j = 0; j < entries.length; j++) {
						if(i == 0) {
							if(Array.isArray(entries[j][0]))
								fr += `<td>${entries[j][0].join("<br>")}</td>`;
							else
								fr += `<td>${entries[j][0]}</td>`;
						}

						if(Array.isArray(entries[j][1]))
							t += `<td>${entries[j][1].join("<br>")}</td>`;
						else
							t += `<td>${entries[j][1]}</td>`;
					}

					if(i == 0)
						t = fr + "</tr>" + t;

					return t + "</tr>";
				}

				var xmlToTables = function(xml){
					xml = sanitize(xml);
					const wrappedXML = `<ROOT>${xml}</ROOT>`;

					const parser = new DOMParser();
					const doc = parser.parseFromString(wrappedXML,"application/xml");

					const records = doc.getElementsByTagName("config_record");
					if (records.length == 0) return "";

					let html = "<table border='1' cellpadding='4' style='border-collapse:collapse;margin:8px 0;'>";
					for(let i=0;i<records.length;i++){
						const obj = parseConfigRecord(records[i]);
						//html += `<h3>config_record #${i+1}</h3>`;
						html += tableFromObj(obj, i);
					}

					return html+"</table>";
				}

				entryText.innerHTML = "<td>Subsystem Configuration</td><td>" + xmlToTables(subsystemInfo) + "</td>";

				table.appendChild(entryText);
				body.appendChild(table);
				//condition for condensed-view single line by removing <br>
				restoreBr(body); //to toggle call restoreBr(el)

				divEl.appendChild(omni);			    //add entry to div element

			} //end displayRunDbViewerEntry()

										font-size: 16px;\
										display: none;\
										opacity: 0;\
										transition: opacity 0.3s ease;\
									}\
								</style>\
							</head>\
							<body>\
								<button \
								onclick=\"(async () => {\
									try {\
									const text = document.body.innerText;\
									await navigator.clipboard.writeText(text);\
									let alert = document.getElementById('inlineCustomAlert');\
									if (!alert) {\
										alert = document.createElement('div');\
										alert.id = 'inlineCustomAlert';\
										alert.className = 'custom-alert';\

			//showCalendar ~~
			//	generates request for rundbviewer based on dayIndex and duration
			function showCalendar(e)
			{
				Debug.log("RunDbViewer calendar xy " + e.pageX + " - " + e.pageY);

				//_refreshDayIndex is days into past, 0 for today
				calendarPopup(e.pageX, e.pageY, calendarHandler, (new Date()).getTime() - _refreshDayIndex * (1000*60*60*24));
			} //end showCalendar()

			//=====================================================================================
			//calendarHandler ~~
			//	parameter is days since Jan 1, 1970
			function calendarHandler(userDate)
			{
				var dateObj = new Date(userDate*1000*60*60*24);
				Debug.log("RunDbViewer calendarHandler userDate " + userDate + " = " +
						dateObj.toDateString());

				//update display with user date
				var refreshDayIndex = ((((new Date()).getTime()  + _TIMEZONE_OFFSET_HOURS*1000*60*60 )
					/ (1000*60*60*24)) | 0)
					- userDate;
				Debug.logv({refreshDayIndex});
				var displayDate = (dateObj.getMonth()+1) + "/" + dateObj.getDate() + "/" + dateObj.getFullYear();

				document.getElementById("rundbviewerCalendarDateDisplay").innerHTML =
					"<a href='Javascript:;' onmouseup='refreshRunDbViewer(" + refreshDayIndex + ");'>(" +
					displayDate + ")</a>";

				//refresh rundbviewer with user date
				refreshRunDbViewer(refreshDayIndex);
			} //end calendarHandler()

			//=====================================================================================
			//advanceByDays ~~
			//	refresh rundbviewer with new day offset and display next to calendar
			//	increasing i is subtracted from _refreshDayIndex to go back in time
			function advanceByDays(i)
			{
				refreshRunDbViewer(_refreshDayIndex - i); //positive is back in time
			} //end advanceByDays()
