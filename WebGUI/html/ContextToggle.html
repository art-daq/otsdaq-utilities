<!DOCTYPE HTML>
<html lang="en">
<head>
	<title>Context Toggle</title>

	<link href='/WebPath/css/fonts.css?family=Inconsolata:400' rel='stylesheet' type='text/css'>
	<link href='/WebPath/css/fonts.css?family=Comfortaa:400' rel='stylesheet' type='text/css'>

	<link rel="stylesheet" type="text/css" href="/WebPath/css/ConfigurationAPI.css">

	<style type="text/css">

		body {
			background-color: rgb(30, 31, 34);
			font-family: 'Inconsolata', monospace;
			margin: 0;
			padding: 0;
			overflow: auto;
		}

		#content {
			padding: 20px;
		}

		#headerDiv {
			text-align: center;
			margin-bottom: 15px;
		}

		#headerDiv h2 {
			color: rgb(200, 200, 210);
			font-family: 'Comfortaa', 'Inconsolata', monospace;
			font-size: 22px;
			margin: 0 0 5px 0;
		}

		#headerDiv .subtitle {
			color: rgb(140, 140, 160);
			font-size: 13px;
		}

		#activeGroupInfo {
			text-align: center;
			color: rgb(140, 160, 180);
			font-size: 13px;
			margin-bottom: 15px;
		}

		#activeGroupInfo b {
			color: rgb(100, 180, 240);
			font-size: 13px;
		}

		#toolbarDiv {
			text-align: center;
			margin-bottom: 15px;
		}

		.toolbar-btn {
			display: inline-block;
			padding: 7px 18px;
			margin: 0 5px;
			border-radius: 5px;
			font-size: 13px;
			font-family: 'Inconsolata', monospace;
			cursor: pointer;
			border: 1px solid;
			transition: background-color 0.15s, color 0.15s, border-color 0.15s;
			user-select: none;
		}

		#refreshBtn {
			background-color: rgb(50, 55, 65);
			border-color: rgb(80, 90, 110);
			color: rgb(180, 190, 210);
		}
		#refreshBtn:hover {
			background-color: rgb(65, 72, 85);
			border-color: rgb(100, 115, 140);
			color: rgb(220, 225, 235);
		}

		#enableAllBtn {
			background-color: rgb(30, 65, 45);
			border-color: rgb(50, 110, 70);
			color: rgb(100, 210, 130);
		}
		#enableAllBtn:hover {
			background-color: rgb(40, 80, 55);
			border-color: rgb(60, 130, 85);
		}

		#disableAllBtn {
			background-color: rgb(70, 35, 35);
			border-color: rgb(110, 50, 50);
			color: rgb(220, 110, 110);
		}
		#disableAllBtn:hover {
			background-color: rgb(85, 42, 42);
			border-color: rgb(130, 60, 60);
		}

		#saveBtn {
			background-color: rgb(35, 50, 80);
			border-color: rgb(60, 90, 150);
			color: rgb(110, 170, 255);
		}
		#saveBtn:hover {
			background-color: rgb(45, 62, 100);
			border-color: rgb(75, 110, 175);
		}
		#saveBtn:disabled {
			background-color: rgb(40, 42, 48);
			border-color: rgb(55, 58, 65);
			color: rgb(90, 95, 105);
			cursor: not-allowed;
		}

		#contextListDiv {
			max-width: 700px;
			margin: 0 auto;
		}

		.context-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 10px 16px;
			margin-bottom: 6px;
			border-radius: 6px;
			background-color: rgb(42, 44, 50);
			border: 1px solid rgb(55, 58, 65);
			transition: background-color 0.15s, border-color 0.15s;
		}

		.context-row:hover {
			background-color: rgb(50, 53, 62);
			border-color: rgb(70, 75, 88);
		}

		.context-info {
			display: flex;
			align-items: center;
			flex: 1;
			min-width: 0;
		}

		.context-name {
			color: rgb(200, 205, 215);
			font-size: 15px;
			font-family: 'Inconsolata', monospace;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		.context-status-badge {
			font-size: 11px;
			font-family: 'Inconsolata', monospace;
			padding: 2px 8px;
			border-radius: 3px;
			margin-left: 12px;
			white-space: nowrap;
			font-weight: bold;
		}

		.context-status-badge.status-on {
			background-color: rgba(50, 180, 100, 0.15);
			color: rgb(80, 200, 120);
			border: 1px solid rgba(50, 180, 100, 0.3);
		}

		.context-status-badge.status-off {
			background-color: rgba(180, 60, 60, 0.15);
			color: rgb(200, 100, 100);
			border: 1px solid rgba(180, 60, 60, 0.3);
		}

		/* Toggle Switch */
		.toggle-switch {
			position: relative;
			width: 48px;
			height: 26px;
			flex-shrink: 0;
			margin-left: 16px;
		}

		.toggle-switch input {
			opacity: 0;
			width: 0;
			height: 0;
		}

		.toggle-slider {
			position: absolute;
			cursor: pointer;
			top: 0; left: 0; right: 0; bottom: 0;
			background-color: rgb(70, 40, 40);
			border: 1px solid rgb(120, 55, 55);
			border-radius: 26px;
			transition: background-color 0.2s, border-color 0.2s;
		}

		.toggle-slider:before {
			position: absolute;
			content: "";
			height: 20px;
			width: 20px;
			left: 2px;
			bottom: 2px;
			background-color: rgb(200, 100, 100);
			border-radius: 50%;
			transition: transform 0.2s, background-color 0.2s;
		}

		.toggle-switch input:checked + .toggle-slider {
			background-color: rgb(30, 70, 50);
			border-color: rgb(50, 130, 80);
		}

		.toggle-switch input:checked + .toggle-slider:before {
			transform: translateX(22px);
			background-color: rgb(80, 200, 120);
		}

		.toggle-switch input:disabled + .toggle-slider {
			opacity: 0.4;
			cursor: not-allowed;
		}

		/* Pending changes indicator */
		.context-row.pending-change {
			border-color: rgb(80, 100, 160);
			background-color: rgb(38, 42, 55);
		}

		#statusBar {
			text-align: center;
			margin-top: 15px;
			font-size: 13px;
			min-height: 18px;
		}

		#statusBar.info {
			color: rgb(100, 180, 240);
		}

		#statusBar.success {
			color: rgb(80, 200, 120);
		}

		#statusBar.error {
			color: rgb(220, 80, 80);
		}

		#statusBar.warning {
			color: rgb(220, 180, 80);
		}

		#loadingOverlay {
			position: fixed;
			top: 0; left: 0; right: 0; bottom: 0;
			background-color: rgba(20, 22, 26, 0.7);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 500;
		}

		#loadingOverlay .spinner {
			color: rgb(100, 180, 240);
			font-size: 16px;
			font-family: 'Inconsolata', monospace;
		}

		.pending-count {
			display: inline-block;
			background-color: rgb(60, 75, 110);
			color: rgb(150, 190, 255);
			padding: 2px 10px;
			border-radius: 10px;
			font-size: 12px;
			margin-left: 8px;
		}

	</style>

	<script type="text/JavaScript" src="/WebPath/js/Globals.js"></script>
	<script type="text/JavaScript" src="/WebPath/js/Debug.js"></script>
	<script type="text/JavaScript" src="/WebPath/js/DesktopContent.js"></script>
	<script type="text/JavaScript" src="/WebPath/js/js_lib/ConfigurationAPI.js"></script>

	<script type="text/JavaScript" src="/WebPath/js/ContextToggle.js"></script>

	<script>

	//=====================================================================================
	//init ~~
	//	init called once body has loaded
	function init()
	{
		ContextToggle.create();
	} //end init()

	</script>
</head>


<body onload='//init() called by DesktopContent.js'>

</body>

</html>
