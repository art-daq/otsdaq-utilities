		// Resize observer to trigger Plotly resize
		const resizeObserver = new ResizeObserver(
			entries => {

					var i = entry.target.id.indexOf("_plotly_container");
					if (i > 0) //treat as plotly resize handler

						Debug.log("Plotly resize");
						try {
							Plotly.Plots.resize(entry.target.id.substr(0, i + 7));
						}
						catch (e) {
							Debug.log("Ignoring plotly error, likey during element transition:", e);

		//=====================================================================================

		//=====================================================================================
		//init ~~
		//init called once body has loaded
		function init() {
			if (firstTime) {
				Debug.logv({ firstTime });

				firstTime = false;
				document.body.addEventListener("keydown", handleKeyInput);
			}

			var windowTooltip = "Welcome to the FE Macros web app!\n\n" +
				"This app provides a user interface for configured devices. " +
				"It allows for launching common functions, such as resets and reading and writing to memory, or interface-spcific functions, at one or many front-ends with a click of the mouse. " +
				"\n\n" +
				"The Macro Name dropdown will always show the list of functions that are defined for the selected front-end filters. " +
				"To start filtering front-ends, choose a Front-End (FE) type (i.e. this should match your FE plugin class name) to access the set of functions that are defined for that particular front-end plugin class. " +
				"You can filter further and handpick a subset of FE devices for more granular control by selecting <b>FE Target UID</b> or <b>Toggle Multi-select</b>. " +
				"Once you've chosen your FE type and target(s), select the FE Macro name, and hit <b>Run</b> to execute. " +
				"The FE Macro will only run one time and on the devices specified. " +
				"\n\n" +
				"The output of the executed function is displayed in the middle panel. " +
				"\n\n" +
				"The panel on the right tracks your history. You can launch previously executed FE Macros, by clicking on them in the history pane. " +
				"Optionally, the <b>Live View</b> button can repeatedly run the next FE Macro clicked with a specified wait between repeat executions. " +
				"\n\n" +
				"Clicking on <b>Sequence Mode</b> on the top left corner will open a fourth panel. Here, users can create an alias for a custom sequence of FE Macros. " +
				"<b>Sequences</b> are saved in $USER_DATA/ServiceData/MacroSequence by username, and can manually be transferred from user to user by copying the sequence's dat file from one user to another at the linux terminal. " +
				"Note that sequences in the admin user's folder are considered public and will be accessible by all users." +
				"\n\nAlso, some FE Macros have a tooltip defined for additional information; click on the tooltip icon <span class='macroInfo' style='display:inline-block; width: 50px; height: 50px; margin: -7px 0 0 -10px;'></span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; next to the FE Macro name to view the tooltip info. ";

			DesktopContent.tooltip("FE Macros Introduction", windowTooltip);
			DesktopContent.setWindowTooltip(windowTooltip);

			Debug.closeErrorPop(); //close any debug pop-ups to start a blank slate
			Debug.log("feMacroTest init ");

			macroModuleLayoutString_ = ""; //row,
			//col,
			//class or *,
			//UID or *,
			//macroType:=fe|public|private:username,
			//macroName;
			//macroModuleLayoutString_ += "0,1,DTCFrontEndInterface,ExampleInterface0,fe,ROC_Read;";
			//macroModuleLayoutString_ += "1,0,DTCFrontEndInterface,*,private,testPrivate;";

			if (verticalOrientation_) {
				macroModuleLayoutString_ += "0,0,*,*,fe,;";
				macroModuleLayoutString_ += "0,1,*,*,fe,;";
				macroModuleLayoutString_ += "0,2,*,*,fe,;";
				macroModuleLayoutString_ += "0,3,*,*,fe,;";
			}
			else {
				macroModuleLayoutString_ += "0,0,*,*,fe,;";
				macroModuleLayoutString_ += "1,0,*,*,fe,;";
				macroModuleLayoutString_ += "0,1,*,*,fe,;";
				macroModuleLayoutString_ += "1,1,*,*,fe,;";
			}


			//get FE Macros
			DesktopContent.XMLHttpRequest("Request?RequestType=getFEMacroList", "",
				function (req) {

					var str = "";

					//var user = DesktopContent.getXMLValue(req,"UserDisplayName");
					//Debug.log("user = " + user);

					var macroVar;
					var macroInArgs, macroOutArgs;
					var FEMACROS_HEADER_FIELDS = 4;

					feClassToFEsMap_ = {}; //reset
					feToMacrosMap_ = {}; //reset
					publicMacros_ = {}; //reset
					privateMacros_ = {}; //reset

					/////////////////////
					//FE Macros
					var feMacros = req.responseXML.getElementsByTagName("FEMacros");
					Debug.log("feMacros.length = " + feMacros.length);
					for (var i = 0; i < feMacros.length; ++i) {
						macroVar = feMacros[i].getAttribute("value");
						Debug.log("Help [macroVar]", feMacros[i].getAttribute("value"));
						Debug.log(macroVar);
						macroVar = macroVar.split(";");

						var supervisor = macroVar[0];
						var lid = macroVar[1];
						var feClass = macroVar[2];
						var feUID = macroVar[3];

						if (1) // ALWAYS add FE in case want to run Macro //  macroVar.length > FEMACROS_HEADER_FIELDS) //at least one function, so display name
						{
							//add FE UID to FE Class in global map ---------------
							if (!feClassToFEsMap_[feClass]) {
								Debug.log("Need to create FE Class to FE map entry.");
								feClassToFEsMap_[feClass] = [];
							}
							feClassToFEsMap_[feClass].push(feUID);
						}

						var c = FEMACROS_HEADER_FIELDS;
						while (c < macroVar.length) {
							var macroName = macroVar[c];

							//add FE Macro name to FE in global map ---------------
							if (!feToMacrosMap_[feUID]) {
								Debug.log("Need to create FE to FE Macro map entry.");
								feToMacrosMap_[feUID] = {};
							}
							Debug.log("Help [macroVar[c+2]", macroVar[c + 2]);
							feToMacrosMap_[feUID][macroName] =
							{
								"requiredPermissions": macroVar[c + 1],
								"tooltip": decodeURIComponent(macroVar[c + 2]),
								"inputs": [],
								"outputs": [],
								"supervisor": supervisor,
								"lid": lid,
								"feClass": feClass,
							};
							c += 3; //skip permissions and tooltip
							for (var j = 0; j < (macroVar[c] | 0); ++j)
								feToMacrosMap_[feUID][macroName].inputs.push(decodeURIComponent(macroVar[c + 1 + j]));
							c += 1 + (macroVar[c] | 0);
							for (var j = 0; j < (macroVar[c] | 0); ++j)
								feToMacrosMap_[feUID][macroName].outputs.push(decodeURIComponent(macroVar[c + 1 + j]));


							c += 1 + (macroVar[c] | 0);
						} //end FE macro loop

					} //end FE supervisor loop

					/////////////////////
					//Public Macros
					FEMACROS_HEADER_FIELDS = 2;
					var publicMacros = req.responseXML.getElementsByTagName("PublicMacro");
					Debug.log("publicMacros.length = " + publicMacros.length);
					for (var i = 0; i < publicMacros.length; ++i) {
						macroVar = publicMacros[i].getAttribute("value");
						Debug.log(macroVar);
						macroVar = macroVar.split(":");

						var macroName = macroVar[0];
						var requiredPermissions = macroVar[1];

						publicMacros_[macroName] =
						{
							"requiredPermissions": requiredPermissions,
							"inputs": [],
							"outputs": [],
						};


						var c = FEMACROS_HEADER_FIELDS;
						for (var j = 0; j < (macroVar[c] | 0); ++j)
							publicMacros_[macroName].inputs.push(macroVar[c + 1 + j]);
						c += 1 + (macroVar[c] | 0);
						for (var j = 0; j < (macroVar[c] | 0); ++j)
							publicMacros_[macroName].outputs.push(macroVar[c + 1 + j]);
					} //end public macro loop

					/////////////////////
					//Private Macros
					var privateMacros = req.responseXML.getElementsByTagName("PrivateMacro");
					Debug.log("privateMacros.length = " + privateMacros.length);
					for (var i = 0; i < privateMacros.length; ++i) {
						macroVar = privateMacros[i].getAttribute("value");
						Debug.log(macroVar);
						macroVar = macroVar.split(":");

						var macroName = macroVar[0];
						var requiredPermissions = macroVar[1];

						privateMacros_[macroName] =
						{
							"requiredPermissions": requiredPermissions,
							"inputs": [],
							"outputs": [],
						};


						var c = FEMACROS_HEADER_FIELDS;
						for (var j = 0; j < (macroVar[c] | 0); ++j)
							privateMacros_[macroName].inputs.push(macroVar[c + 1 + j]);
						c += 1 + (macroVar[c] | 0);
						for (var j = 0; j < (macroVar[c] | 0); ++j)
							privateMacros_[macroName].outputs.push(macroVar[c + 1 + j]);
					} //end public macro loop


					Debug.log("feClassToFEsMap_", feClassToFEsMap_);
					Debug.log("feToMacrosMap_", feToMacrosMap_);
					Debug.log("privateMacros_", privateMacros_);
					Debug.log("publicMacros_", publicMacros_);


					if (Object.keys(feClassToFEsMap_).length == 0) {
						Debug.log("No FE Macros were found, have you Configured the State Machine? " +
							"Try configuring and then <a onclick='init()'>Refresh</a> this window.",
							Debug.WARN_PRIORITY);
					}

					//construct macro module layout
					Debug.log("macroModuleLayoutString_", macroModuleLayoutString_);

					macroModules_ = {}; //reset
					layoutMaxRow_ = 0;
					layoutMaxCol_ = 0;
					var layoutModules = macroModuleLayoutString_.split(';');
					for (var i = 0; i < layoutModules.length; ++i) {
						var layoutArgs = layoutModules[i].split(',');
						if (layoutArgs.length != 6)
							continue;
						Debug.log(i, ":", "layoutArgs", layoutArgs);

						//layout args:
						//			row,
						//			col,
						//			class or *,
						//			UID or *,
						//			macroType:=fe|public|private:username,
						//			macroName;
						var r = layoutArgs[0] | 0;
						var c = layoutArgs[1] | 0;
						var feClassSelected = layoutArgs[2];
						var feUIDSelected = layoutArgs[3];
						var feMacroTypeSelected = layoutArgs[4];
						var feMacroNameSelected = layoutArgs[5];

						if (r > layoutMaxRow_)
							layoutMaxRow_ = r;
						if (c > layoutMaxCol_)
							layoutMaxCol_ = c;

						if (!macroModules_[r])
							macroModules_[r] = {};
						if (!macroModules_[r][c])
							macroModules_[r][c] = {};
						macroModules_[r][c]["feClassSelected"] = feClassSelected;
						macroModules_[r][c]["feUIDSelected"] = feUIDSelected;
						macroModules_[r][c]["feMacroTypeSelected"] = feMacroTypeSelected;
						macroModules_[r][c]["feMacroNameSelected"] = feMacroNameSelected;
						macroModules_[r][c]["feMacroNameObject"] = undefined;

					} //end macro module extraction loop

		//=====================================================================================
		//runMacro ~~
		var verticalOutputDivSize_ = [600, 1000];
		var verticalOutputScrollPosition_ = [0, 0];
		var row, col;
		function runMacro(r, c) {
			row = r;
			col = c;
			//get any user resize of output element
			var el = document.getElementById("verticalLayoutOutputDiv");
			if (el) {
				Debug.log("Found output div at size ", el.offsetWidth, el.offsetHeight);
				verticalOutputDivSize_ = [el.offsetWidth, el.offsetHeight - 1];
				Debug.log("Found output div at scroll position ", el.scrollLeft, el.scrollTop);
				verticalOutputScrollPosition_ = [el.scrollLeft, el.scrollTop];

				el = document.getElementById("macroModule-output");
				el.style.width = (verticalOutputDivSize_[0] + 30) + "px";
			}

			lastRunMacro = { row: r, col: c };

			Debug.log("runMacro(" + r + "," + c + ")");

			Debug.log("feUID target", macroModules_[r][c].feUIDSelected);

			var scrollTop = DesktopContent.getWindowScrollTop();
			Debug.log("Starting scroll position", scrollTop);

			if (!macroModules_[r]) {
				Debug.log("Invalid row " + r + " specified for layout module.",
					Debug.HIGH_PRIORITY);
				Debug.log("macroModules_", macroModules_);
				return;
			}
			if (!macroModules_[r][c]) {
				Debug.log("Invalid column " + c + " specified for layout module.",
					Debug.HIGH_PRIORITY);
				Debug.log("macroModules_", macroModules_);
				return;
			}

			var feClassSelected = macroModules_[r][c].feClassSelected;
			var feUIDSelected = macroModules_[r][c].feUIDSelected;
			var feMacroTypeSelected = macroModules_[r][c].feMacroTypeSelected;
			var macroName = macroModules_[r][c].feMacroNameSelected;

			var macroObj = macroModules_[r][c].feMacroNameObject[macroName];
			if (!macroObj) {
				Debug.log("Invalid Macro Name '" + macroName + "' - please select a valid Macro Name.",
					Debug.HIGH_PRIORITY);
				Debug.log("macroModules_", macroModules_);
				return;
			}


			var saveOutputs = document.getElementById("outputMacroToFile-row-" + r + "-col-" + c).checked ? 1 : 0;
			var inputsArr = macroObj.inputs;
			var outputsArr = macroObj.outputs;

			var inEls = document.getElementsByClassName(
				"macroInput-row-" + r + "-col-" + c
			);
			var postData = "";

			postData += "inputArgs=";
			inputData = "";
			//save input args to history, and last macroName map to input args for r,c FE macro cell
			inputValueHistory_[r + "," + c] = [macroName, {}];
			for (var i = 0; i < inputsArr.length; ++i) {
				Debug.log("inputArgs " + inputsArr[i]);
				Debug.log("inputArgs.value " + inEls[i].value);
				inputValueHistory_[inputsArr[i]] = inEls[i].value;
				inputValueHistory_[r + "," + c][1][inputsArr[i]] = inEls[i].value;
				if (i) inputData += ";";
				inputData += encodeURIComponent(inputsArr[i]) + "," + encodeURIComponent(inEls[i].value);
			}
			postData += inputData;


			postData += "&outputArgs=";
			var outputData = "";
			for (var i = 0; i < outputsArr.length; ++i) {
				Debug.log("outputArgs " + outputsArr[i]);
				if (i) outputData += ",";
				outputData += encodeURIComponent(outputsArr[i]);
			}
			postData += outputData;

			Debug.log("postData", postData);

			var str = "";
			str += "Launched '" + macroName +
				"'... " + getDateString(new Date) +
				".. waiting for response...";
			var el;

			if (verticalOrientation_)
				el = document.getElementById(
					"macroModule-output");
			else
				el = document.getElementById(
					"macroResults-row-" + r + "-col-" + c);

			el.style.whiteSpace = "nowrap"; // to keep line breaks where developer intended
			el.innerHTML = str;

			// if I am building a sequence I do not have to run
			if (!sequenceBuilding_) {
				DesktopContent.XMLHttpRequest("Request?RequestType=runFEMacro" +
					//"&feSupervisorID=" + feSupervisorID +
					"&feClassSelected=" + feClassSelected +
					"&feUIDSelected=" + feUIDSelected +
					"&macroType=" + feMacroTypeSelected +
					"&macroName=" + macroName +
					"&saveOutputs=" + saveOutputs
					, postData,
					handleMacroResponse,
					0 /*reqParam*/, 0 /*progressHandler*/,
					true /*callHandlerOnErr*/,
					true /*doNotShowLoadingOverlay*/
				);
			}

			var command = {
				"feClass": feClassSelected,
				"feUID": feUIDSelected,
				"macroType": feMacroTypeSelected,
				"macroName": macroName,
				"inputArgs": inputData,
				"outputArgs": outputData,
				"saveOutputs": saveOutputs,
			}
			// add to the sequence
			if (verticalOrientation_ && sequenceBuilding_) {
				appendMacroToSequence(JSON.stringify(command));
				return;
			}

			if (verticalOrientation_)
				appendHistoryRecord(JSON.stringify(command));
		} //end runMacro()

			//======================
			//	returns a compact html excerpt of <text> around the found position, with the
			//	found range highlighted in yellow, for the alert popup
			function localGetExcerpt(text, foundIndex, foundLength) {
				var EXCERPT_PAD = 60; //characters of context on each side
				var start = Math.max(0, foundIndex - EXCERPT_PAD);
				var end = Math.min(text.length, foundIndex + foundLength + EXCERPT_PAD);
				var before = (start > 0 ? "..." : "") +
					text.substring(start, foundIndex).replace(/\s+/g, ' ').replace(/^\s+/, '');
				var found = text.substring(foundIndex, foundIndex + foundLength).replace(/\s+/g, ' ');
				var after = text.substring(foundIndex + foundLength, end).replace(/\s+/g, ' ').replace(/\s+$/, '') +
					(end < text.length ? "..." : "");
				return escapeHtml(before) +
					"<mark style='background-color: yellow; color: black;'>" +
					escapeHtml(found) + "</mark>" +
					escapeHtml(after);
			} //end localGetExcerpt()

				var triggeredNumber = null;

				if (comparisonOperator === 'none') {
					//skip intro to get RESPONSE, like 'Last ran... Mon Feb 3 14:20:03 2025 CST<br>FEMacro: "DTC Write"<br>\nOn 1 front-end target(s).\n\n\nFEMacro: "DTC Write"\nFE Target #1 UID: DTC7 (mu2edaq14.fnal.gov:ots::FESupervisor/LID-280)\n....RESPONSE'
					var searchedOutput = el.innerText.substr(el.innerText.indexOf(")\n"));
					var keywordIndex = searchedOutput.indexOf(flagKeyword);
					var outputContainsKeyword = (keywordIndex >= 0);
					var shouldFlag = (flagIfPresent && outputContainsKeyword) || (!flagIfPresent && !outputContainsKeyword);

					setFlagStatus(outputContainsKeyword ?
						"Keyword found in output" + (shouldFlag ? " (triggered!)" : "") :
						"Keyword not found in output" + (shouldFlag ? " (triggered!)" : ""));

					if (shouldFlag) {
						var message = flagIfPresent ?
							"ALERT: String '" + flagKeyword + "' found!\n\nThe macro has been halted." :
							"ALERT: String '" + flagKeyword + "' not found!\n\nThe macro has been halted.";
						localHandleFlagTriggered(message,
							keywordIndex >= 0 ? //show excerpt of where the keyword was found
								localGetExcerpt(searchedOutput, keywordIndex, flagKeyword.length) :
								undefined);
					}
				}
				else {
					// Label and comparison value from the popup's numeric-mode inputs
					Debug.log("Flag Keyword:", flagKeyword);  // Log #2
					if (flagCompareLabel && !isNaN(flagCompareNumber)) {
						var searchText = flagCompareLabel;
						var numberToCompare = flagCompareNumber;
						//normalize non-breaking spaces (from &nbsp; in output html), so label indexOf works
						var searchedOutput = el.innerText.replace(/\u00A0/g, ' ');

						var conditionMet = false;
						var extractedValues = []; //for Flag Status feedback
						var triggeredExcerptHtml; //for alert popup

						//find each occurrence of the label in the output text; value(s) follow
						//	a '|' ':' or '=' separator, and may be a comma-separated list (e.g. one per link);
						//	also identify '( label ) value' form, e.g. '(0) 0xbd00, (1) 0xbd00';
						//	values may be decimal or hex (0x...)
						var labelIndex = -1;
						while (!conditionMet &&
							(labelIndex = searchedOutput.indexOf(searchText, labelIndex + 1)) >= 0) {

							//require label occurrence to not be inside a larger word/number (e.g. label '4' in '38940')
							var labelPrevChar = labelIndex ? searchedOutput[labelIndex - 1] : '';
							if (/[\w.]/.test(labelPrevChar)) continue;

							var segmentStart = labelIndex + searchText.length;

							//check for '( label )' form: '(' before and ')' after label (ignoring spaces)
							var parenAfterMatch = searchedOutput.substring(segmentStart, segmentStart + 10).match(/^\s*\)/);
							var isParenthesized = (parenAfterMatch &&
								/\(\s*$/.test(searchedOutput.substring(Math.max(0, labelIndex - 10), labelIndex))) ? true : false;
							if (isParenthesized)
								segmentStart += parenAfterMatch[0].length; //skip past ')'

							var scanStart = segmentStart;
							var firstLine = true;
							var valuesBeforeOccurrence = extractedValues.length;
							while (true) { //scan label's line; and next line, if label's line has no values
								var lineEnd = searchedOutput.indexOf('\n', scanStart);
								if (lineEnd < 0) lineEnd = searchedOutput.length;
								var segment = searchedOutput.substring(scanStart, lineEnd);
								var numScanStart = 0;
								if (firstLine) {
									if (isParenthesized) {
										//value(s) end at the next parenthesized label, if any
										var nextParen = segment.indexOf('(');
										if (nextParen >= 0) segment = segment.substring(0, nextParen);
									}
									else {
										var sepMatch = segment.match(/^\s*[|:=]\s*/); //require separator right after label
										if (!sepMatch) break; //no separator, not a label match here
										numScanStart = sepMatch[0].length;
									}
								}

								//extract and test each number in the segment (hex 0x... or decimal)
								var numberRegex = /0[xX][0-9a-fA-F]+|-?\d+(\.\d+)?/g;
								numberRegex.lastIndex = numScanStart;
								var numMatch;
								while (!conditionMet && (numMatch = numberRegex.exec(segment)) !== null) {
									//skip partial matches inside words, while allowing attached units (e.g. 25.0V);
									//	also skip 'N(' notation (e.g. address in '0(0x0)')
									var prevChar = numMatch.index ? segment[numMatch.index - 1] : '';
									var nextChar = segment[numMatch.index + numMatch[0].length] || '';
									if (/[\w.]/.test(prevChar) || /[\d.xX(]/.test(nextChar)) continue;
									//skip parenthesized numbers like '(0)' since they are labels, not values
									var prevNonSpace = segment.substring(0, numMatch.index).match(/(\S)\s*$/);
									var nextNonSpace = segment.substring(numMatch.index + numMatch[0].length).match(/^\s*(\S)/);
									if (prevNonSpace && prevNonSpace[1] == '(' &&
										nextNonSpace && nextNonSpace[1] == ')') continue;

									var foundNumber = /^0[xX]/.test(numMatch[0]) ?
										parseInt(numMatch[0], 16) : parseFloat(numMatch[0]);
									extractedValues.push(numMatch[0]); //display original token (e.g. hex) in Flag Status
									Debug.log("Label found, Found Number:", foundNumber, "Number To Compare:", numberToCompare);

									switch (comparisonOperator) {
										case "eq": conditionMet = (foundNumber == numberToCompare); break;
										case "gt": conditionMet = (foundNumber > numberToCompare); break;
										case "gte": conditionMet = (foundNumber >= numberToCompare); break;
										case "lt": conditionMet = (foundNumber < numberToCompare); break;
										case "lte": conditionMet = (foundNumber <= numberToCompare); break;
									}
									if (conditionMet) {
										triggeredNumber = numMatch[0]; //original token (e.g. hex) for alert message
										triggeredExcerptHtml = localGetExcerpt(searchedOutput,
											scanStart + numMatch.index, numMatch[0].length);
									}
								}

								//if label's own line had no values (e.g. 'label = ...text...:'),
								//	also scan the following line for a value list
								if (!conditionMet && firstLine &&
									extractedValues.length == valuesBeforeOccurrence &&
									lineEnd < searchedOutput.length) {
									firstLine = false;
									scanStart = lineEnd + 1;
									continue;
								}
								break;
							} //end line scan loop
						} //end label occurrence loop

						//give user feedback of label match attempt
						var shouldFlag = (flagIfPresent && conditionMet) || (!flagIfPresent && !conditionMet);
						setFlagStatus(extractedValues.length == 0 ?
							"Label '" + searchText + "' not found" + (shouldFlag ? " (triggered!)" : "") :
							"Extracted label value" + (extractedValues.length > 1 ? "s" : "") + " = " +
							extractedValues.join(", ") + (shouldFlag ? " (triggered!)" : ""));

						if (shouldFlag) {
							var message;
							var operatorSymbol = getOperatorSymbol(comparisonOperator);
							Debug.log("Operator Symbol for", comparisonOperator, ":", operatorSymbol);  // Log #10
							if (conditionMet)
								message = "ALERT: Condition met for: " + searchText + " " + operatorSymbol + " " + flagCompareNumberString + ".\n\nTarget was stopped at " + triggeredNumber + "\n\nThe macro has been halted.";
							else
								message = "ALERT: Condition NOT met for: " + searchText + " " + operatorSymbol + " " + flagCompareNumberString +
									(extractedValues.length == 0 ?
										".\n\nLabel '" + searchText + "' was not found in the output." :
										".\n\nExtracted value(s): " + extractedValues.join(", ")) +
									"\n\nThe macro has been halted.";

							localHandleFlagTriggered(message, triggeredExcerptHtml);
						}
					}
				}
			} //end handle flag/trigger actions

			//prepare for next command in command block
			if (isRunningCommandBlock) {
				commandBlockIndex++;
				if (commandBlockIndex < commandBlockQueue.length) {
					// Execute next command in the block
					onClickHistoryRecord(commandBlockQueue[commandBlockIndex]);
				} else {
					// All commands in the block have been executed
					isRunningCommandBlock = false;
					commandBlockQueue = [];
					commandBlockIndex = 0;
				}
			}
			//prepare for next live view command
			else if (liveViewActive) {
				if (currentLiveViewTimeout !== null)
					clearTimeout(currentLiveViewTimeout);

				currentLiveViewTimeout = setTimeout(
					function () {
						if (currentHistoryRecord !== null) {
							onClickHistoryRecord(currentHistoryRecord);
						}
						else if (lastRunMacroDetails.row !== null && lastRunMacroDetails.col !== null) {
							runMacro(lastRunMacroDetails.row, lastRunMacroDetails.col);
						}
					}, intervalTime);
			}
		} //end handleMacroResponse()

		//getDateString ~~
		var dayArr_ = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
		var monthArr_ = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
		function getDateString(date) {
			var dateStr = "";

			dateStr += dayArr_[date.getDay()];
			dateStr += " ";
			dateStr += monthArr_[date.getMonth()];
			dateStr += " ";
			dateStr += date.getDate();
			dateStr += " ";
			dateStr += date.getHours();
			dateStr += ":";
			dateStr += ((date.getMinutes() < 10) ? "0" : "") + date.getMinutes();
			dateStr += ":";
			dateStr += ((date.getSeconds() < 10) ? "0" : "") + date.getSeconds();
			dateStr += " ";
			dateStr += date.getFullYear();
			dateStr += " ";
			dateStr += date.toLocaleTimeString([], { timeZoneName: "short" }).split(" ")[2];
			return dateStr;
		} //end getDateString()

		var historyRecords_ = []; // chronological order: oldest -> newest
		var historyRenderRecordMap_ = {};
		var historyRenderGroupMap_ = {};
		var historyRenderRecordId_ = 0;
		var historyRenderGroupId_ = 0;
		var HISTORY_GROUP_BOUNDARY_PAUSE_THRESHOLD_SEC = 8; //if there is a pause of at least this many seconds between macros, consider it a strong candidate for a group boundary
		//=====================================================================================
		function parseHistoryTimestamp(timestamp) {
			var parsed = parseInt(timestamp, 10);
			return isNaN(parsed) ? 0 : parsed;
		}

		//=====================================================================================
		function normalizeHistoryRecord(record) {
			var normalized = (typeof record === "string") ? JSON.parse(record) : record;
			normalized["launchTime"] = parseHistoryTimestamp(normalized["launchTime"]);
			normalized["completeTime"] = parseHistoryTimestamp(normalized["completeTime"]);
			if (!normalized["completeTime"] && normalized["launchTime"])
				normalized["completeTime"] = normalized["launchTime"];
			return normalized;
		}

		//=====================================================================================
		function getHistoryRecordSignature(recordObj) {
			return JSON.stringify({
				feClass: recordObj["feClass"],
				feUID: recordObj["feUID"],
				macroType: recordObj["macroType"],
				macroName: recordObj["macroName"],
				inputArgs: recordObj["inputArgs"],
				outputArgs: recordObj["outputArgs"],
				saveOutputs: recordObj["saveOutputs"]
			});
		}

		//=====================================================================================
		function getHistoryRecordDescription(recordObj, useHtmlBreaks) {
			var lineBreak = useHtmlBreaks ? "<br>&nbsp;&nbsp;&nbsp;&nbsp;" : "\n    ";
			var recordName = "";
			var inputArgs = recordObj["inputArgs"].split(";");
			for (var j = 0; j < inputArgs.length; j++) {
				var tuple = inputArgs[j].split(",");
				if (j)
					recordName += lineBreak;
				if (tuple[0] !== "")
					recordName += decodeURIComponent(tuple[0]) + "=" + decodeURIComponent(tuple[1]) + ";";
			}

			var recordText = "";
			if (recordObj["feUID"] === "*" && recordObj["feClass"] !== "*")
				recordText = "(all " + recordObj["feClass"] + ") ";
			else
				recordText = "(" + recordObj["feUID"] + ") ";
			var macroNameDisplay = useHtmlBreaks ? "<label style='font-weight: 900;'>" + recordObj["macroName"] + "</label>" : recordObj["macroName"];
			recordText += macroNameDisplay + ": ";

			return recordText + (recordName === "" ? "No arguments" : recordName);
		}

		//=====================================================================================
		function escapeHistoryHtml(text) {
			return text
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;")
				.replace(/\"/g, "&quot;")
				.replace(/'/g, "&#39;");
		}

		//=====================================================================================
		function historySlicesMatch(records, startIndex, blockLength, repeatIndex) {
			var baseIndex = startIndex;
			var compareIndex = startIndex + repeatIndex * blockLength;
			for (var i = 0; i < blockLength; ++i)
				if (getHistoryRecordSignature(records[baseIndex + i]) !==
					getHistoryRecordSignature(records[compareIndex + i]))
					return false;
			return true;
		}

		//=====================================================================================
		function historySlicesMatchFromEnd(records, endIndex, blockLength, repeatIndex) {
			var newestBlockStart = endIndex - blockLength;
			var compareStart = newestBlockStart - repeatIndex * blockLength;
			for (var i = 0; i < blockLength; ++i)
				if (getHistoryRecordSignature(records[newestBlockStart + i]) !==
					getHistoryRecordSignature(records[compareStart + i]))
					return false;
			return true;
		}

		//=====================================================================================
		function getHistoryPauseBetweenRecords(previousRecord, nextRecord) {
			if (!previousRecord || !nextRecord)
				return null;

			var previousCompleteTime = parseHistoryTimestamp(previousRecord["completeTime"]);
			var nextLaunchTime = parseHistoryTimestamp(nextRecord["launchTime"]);
			if (!previousCompleteTime || !nextLaunchTime || nextLaunchTime < previousCompleteTime)
				return null;

			return nextLaunchTime - previousCompleteTime;
		}

		//=====================================================================================
		function getHistoryGroupBoundaryGap(records, blockStart) {
			if (blockStart <= 0 || blockStart >= records.length)
				return null;

			return getHistoryPauseBetweenRecords(records[blockStart - 1], records[blockStart]);
		}

		//=====================================================================================
		function isStrongHistoryBoundaryGap(gapSeconds) {
			return gapSeconds !== null && gapSeconds >= HISTORY_GROUP_BOUNDARY_PAUSE_THRESHOLD_SEC;
		}

		//=====================================================================================
		function isBetterHistoryGroupCandidate(candidate, currentBest) {
			if (!currentBest)
				return true;

			var candidateHasStrongGap = isStrongHistoryBoundaryGap(candidate.boundaryGap);
			var currentBestHasStrongGap = isStrongHistoryBoundaryGap(currentBest.boundaryGap);

			if (candidateHasStrongGap != currentBestHasStrongGap)
				return candidateHasStrongGap;

			if (candidateHasStrongGap && candidate.boundaryGap != currentBest.boundaryGap)
				return candidate.boundaryGap > currentBest.boundaryGap;

			if (candidate.span != currentBest.span)
				return candidate.span > currentBest.span;

			return candidate.blockLength < currentBest.blockLength;
		}

		//=====================================================================================
		function buildCompressedHistoryNodes(records) {
			var nodes = [];
			for (var endIndex = records.length; endIndex > 0;) {
				var bestMatch = null;
				for (var blockLength = 1; 2 * blockLength <= endIndex; ++blockLength) {
					var repeatCount = 1;
					while ((repeatCount + 1) * blockLength <= endIndex &&
						historySlicesMatchFromEnd(records, endIndex, blockLength, repeatCount))
						++repeatCount;

					if (repeatCount > 1) {
						var span = blockLength * repeatCount;
						var candidate = {
							blockLength: blockLength,
							repeatCount: repeatCount,
							span: span,
							boundaryGap: getHistoryGroupBoundaryGap(records, endIndex - blockLength)
						};
						if (isBetterHistoryGroupCandidate(candidate, bestMatch))
							bestMatch = candidate;
					}
				}

				if (bestMatch) {
					var blockStart = endIndex - bestMatch.blockLength;
					var blockRecords = records.slice(blockStart, endIndex);
					nodes.unshift({
						type: "group",
						repeatCount: bestMatch.repeatCount,
						records: blockRecords,
						children: buildCompressedHistoryNodes(blockRecords)
					});
					endIndex -= bestMatch.span;
				}
				else
					nodes.unshift({ type: "record", record: records[--endIndex] });
			}
			return nodes;
		} //end buildCompressedHistoryNodes()

		//=====================================================================================
		function getHistoryGroupTitle(records, repeatCount)
		{
			// Debug.log("Repeated " + repeatCount + "x");
			var title = "Rerun this repeated " + records.length + "-command group:";
			for (var i = 0; i < records.length; ++i)
				title += "\n" + (i + 1) + ". " + getHistoryRecordDescription(records[i], false);
			return title;
		} //end getHistoryGroupTitle()

		//=====================================================================================
		function renderHistoryNode(node, renderState) {
			if (node.type === "record") {
				var recordId = historyRenderRecordId_++;
				historyRenderRecordMap_[recordId] = node.record;
				var className = "record " + ((renderState.rowIndex++ % 2 === 0) ? "light" : "dark");
				var recordTitle = escapeHistoryHtml("Run this command:\n" + getHistoryRecordDescription(node.record, false));
				return DesktopContent.htmlOpen(
					"div",
					{
						"id": "historyRecord" + recordId,
						"class": className,
						"title": recordTitle,
						"onClick": "onClickHistoryRecordByIndex(" + recordId + ")"
					},
					"<span class='history-record-label'>" + getHistoryRecordDescription(node.record, true) + "</span>",
					true);
			}

			var groupId = historyRenderGroupId_++;
			historyRenderGroupMap_[groupId] = node.records;
			var groupTitle = escapeHistoryHtml(getHistoryGroupTitle(node.records, node.repeatCount));
			var childHtml = renderHistoryNodes(node.children, renderState);
			return "<div class='history-group'>" +
				"<div class='history-group-bar' title='" + groupTitle + "' onClick='onClickHistoryGroup(" + groupId + ");'>" +
				"<span>" + node.repeatCount + "x</span></div>" +
				"<div class='history-group-content'>" + childHtml + "</div>" +
				"</div>";
		} //end renderHistoryNode()

		//=====================================================================================
		function renderHistoryNodes(nodes, renderState) {
			var html = "";
			for (var i = nodes.length - 1; i >= 0; --i)
				html += renderHistoryNode(nodes[i], renderState);
			return html;
		}

			el.innerHTML = str;

			//save input args to history
			//recordObj["inputArgs"] is encoded ;-separated field/value pairs (pair separated by ,)
			var inputArgsSplit = recordObj["inputArgs"].split(';');
			for (var i = 0; i < inputArgsSplit.length; ++i) {
				var inputArgsPair = inputArgsSplit[i].split(',');
				inputArgsPair[0] = decodeURIComponent(inputArgsPair[0]); //field
				inputArgsPair[1] = decodeURIComponent(inputArgsPair[1]); //value
				Debug.log("inputArgs field " + inputArgsPair[0]);
				Debug.log("inputArgs value " + inputArgsPair[1]);
				inputValueHistory_[inputArgsPair[0]] = inputArgsPair[1];
			}

			var postData = "inputArgs=" + recordObj["inputArgs"] + "&outputArgs=" + recordObj["outputArgs"];
			DesktopContent.XMLHttpRequest("Request?RequestType=runFEMacro" +
				//"&feSupervisorID=" + feSupervisorID +
				"&feClassSelected=" + recordObj["feClass"] +
				"&feUIDSelected=" + recordObj["feUID"] +
				"&macroType=" + recordObj["macroType"] +
				"&macroName=" + recordObj["macroName"] +
				"&saveOutputs=" + parseInt(["saveOutputs"])
				, postData,
				handleMacroResponse,
				0 /*reqParam*/, 0 /*progressHandler*/,
				true /*callHandlerOnErr*/,
				true /*doNotShowLoadingOverlay*/
			);


			// show the command in the interface
			appendHistoryRecord(JSON.stringify(recordObj));

		function showSequence(target, seq) {
			Debug.log(target, seq);
			var container = document.getElementById(target);
			container.innerHTML = "";
			var GUIIndex = 0;
			for (const entry of Object.entries(seq)) {
				var index = entry[0];
				var command = JSON.parse(entry[1]);
				// alternate the color
				var className = "component ";
				if (GUIIndex % 2 == 0)
					className += "light";
				else
					className += "dark";

				// create the record name
				var recordName = "";
				var inputArgs = command["inputArgs"].split(";");
				for (var j = 0; j < inputArgs.length; j++) {
					var tuple = inputArgs[j].split(",");
					if (j)
						recordName += "<br>&nbsp;&nbsp;&nbsp;&nbsp;"
					if (tuple[0] !== "")
						recordName += decodeURIComponent(tuple[0]) + "=" + decodeURIComponent(tuple[1]) + ";";
				}

				// build the record text
				var recordText = ""
				if (command["feUID"] === "*" && command["feClass"] !== "*")
					recordText = "(all " + command["feClass"] + ") ";
				else
					recordText = "(" + command["feUID"] + ") ";

				recordText += command["macroName"] + ": ";

				container.innerHTML += DesktopContent.htmlOpen(
					"div",
					{
						"id": "sequenceComponent-" + index,
						"class": className,
					},
					"<span><i>#" + (GUIIndex + 1) + "</i> " + recordText + "<br>&nbsp;&nbsp;&nbsp;&nbsp;" + (recordName === "" ? "No arguments" : recordName) + "</span>",
					true);

				GUIIndex++;
				if (target === "sequence-builder") {
					// append control sequence buttons
					var FEsequence = document.getElementById("sequenceComponent-" + index);
					var sequenceAction = document.createElement("div");
					sequenceAction.style.display = "inline-block"
					sequenceAction.setAttribute("class", "vbox");

					// up button
					var upBtn = document.createElement("button");
					upBtn.className = "sequence-btn";
					upBtn.innerHTML = "<span>&ShortUpArrow;</span>";
					upBtn.setAttribute("onClick", "moveUpSequence(" + index + ")");
					// remove button
					const removeBtn = document.createElement("button");
					removeBtn.className = "sequence-btn";
					removeBtn.innerHTML = "<span>&#10006;</span>";
					removeBtn.setAttribute("onClick", "removeFromSequence(" + index + ")");
					// down button
					var downBtn = document.createElement("button");
					downBtn.className = "sequence-btn";
					downBtn.innerHTML = "<span>&ShortDownArrow;</v>";
					downBtn.setAttribute("onClick", "moveDownSequence(" + index + ")");

					sequenceAction.appendChild(downBtn);
					sequenceAction.appendChild(removeBtn);
					sequenceAction.appendChild(upBtn);
					FEsequence.appendChild(sequenceAction);
				}
			}

		function deleteSequence() {
			var selector = document.getElementById("select-sequence");

			DesktopContent.XMLHttpRequest("Request?RequestType=deleteFEMacroSequence" +
				"&name=" + selector.value,
				"",
				function () //handler
				{
					Debug.log("deleteFEMacroSequence() was called.");

					// Find and remove the selected option
					for (var index = 0; index < selector.options.length; index++) {
						if (selector.options[index].value === selector.value) {
							selector.remove(index);

							// Select and load the next sequence if available
							if (selector.options.length > 0) {
								// Adjust index if it's now out of bounds
								if (index === selector.options.length) {
									index--;
								}
								selector.selectedIndex = index;

								// Load the newly selected sequence
								selectSequence(selector.options[selector.selectedIndex].value);
							}
							else {
								// No more sequences, reset the UI
								selectedSequence_ = {};
								showSequence("show-sequence", selectedSequence_);
								statusActionButtons(true);
							}

							break;
						}
					}
				} //end deleteFEMacroSequence handler
			);

		//=====================================================================================
		//saveSequence ~~
		function saveSequence(overwrite) {
			var sequenceSelector = document.getElementById("select-sequence");
			var sequenceName = document.getElementById("sequenceName");
			var errorMessage = document.getElementById("sequenceName-error");
			var isNewSequence = sequenceSelector.value === "Unnamed";
			Debug.log("saveSequence", sequenceName);

			// check if name is empty
			if (sequenceName.value === "") {
				errorMessage.innerText = "Sequence name cannot be empty!";
				Debug.err("Sequence name cannot be empty! Please enter a sequence name to be saved.");
				return;
			}

			// Check for invalid characters
			var invalidCharacters = /[<>:"/\\|?*]/;
			if (invalidCharacters.test(sequenceName.value)) {
				errorMessage.innerText = "Sequence name contains invalid characters!";
				Debug.err("Sequence name contains invalid characters! Please use only alphanumeric, spaces, dashes, underscores.");
				return;
			}

			// check if the name is unique
			if (!overwrite)
				for (var i = 0; i < sequenceSelector.options.length; i++)
					if (sequenceSelector.options[i].value === sequenceName.value) {
						errorMessage.innerText = "Name already in use!";
						Debug.err("Name already in use! Please click <b>Overwrite</b> if you want to modify this sequence.");
						return;
					}

			// prepare the payload of the API call
			var postData = "FEsequence=" + encodeURIComponent(JSON.stringify(tempSequence_)) +
				"&sequenceName=" + encodeURIComponent(sequenceName.value);


			Debug.log(JSON.stringify(tempSequence_));
			Debug.log("Sequence Name:", sequenceName.value);

			// API call
			DesktopContent.XMLHttpRequest("Request?RequestType=saveFEMacroSequence" +
				(overwrite ? "&overwrite=1" : ""),
				postData,
				function (req, reqParam, errStr) {
					if (!errStr)
						errStr = "";
					var err = DesktopContent.getXMLValue(req, "Error");
					if (err && err != "")
						errStr += "\n" + err;
					if (errStr != "") {
						Debug.err("Error while saving ne FE Macro Sequence: " + errStr);
						return;
					}

					// Update the dropdown based on whether it's a new sequence or not
					if (isNewSequence) {
						// Check if the "Unnamed" option exists and update it
						var unnamedOption = sequenceSelector.querySelector("option[value='Unnamed']");
						if (unnamedOption) {
							unnamedOption.text = sequenceName.value;
							unnamedOption.value = sequenceName.value;
						}
					}
					else {
						// Check if an option with this name already exists
						var existingOption = Array.from(sequenceSelector.options).find(option => option.value === sequenceName.value);
						if (!existingOption) {
							// Add a new option for the saved sequence
							var option = document.createElement("option");
							option.text = sequenceName.value;
							option.value = sequenceName.value;
							sequenceSelector.add(option);
						}
					}

					sequenceSelector.value = sequenceName.value;
					selectSequence(sequenceName.value);

					Debug.info("Sequence '" + sequenceName.value + "' was successfully saved!");
				}, //end save handler
				0 /*reqParam*/,
				0 /*progressHandler*/,
				true /*callHandlerOnErr*/
			); //end save request

			var errorMessage = document.getElementById("sequenceName-error");
			errorMessage.innerText = "";
			hidePopupSaveSequence()
			closeSequence();
		} //end saveSequence()

		//=====================================================================================
		//onClickRunSequence ~~
		function onClickRunSequence() {
			Debug.log("onClickRunSequence()");
			var toggleButton = document.getElementById("runSequenceBtn");

			var el = document.getElementById("verticalLayoutOutputDiv");
			if (el) {
				Debug.log("Found output div at size ", el.offsetWidth, el.offsetHeight);
				verticalOutputDivSize_ = [el.offsetWidth, el.offsetHeight - 1];
				Debug.log("Found output div at scroll position ", el.scrollLeft, el.scrollTop);
				verticalOutputScrollPosition_ = [el.scrollLeft, el.scrollTop];

				el = document.getElementById("macroModule-output");
				el.style.width = (verticalOutputDivSize_[0] + 30) + "px";
			}

			if (!selectedSequence_ || Object.keys(selectedSequence_).length === 0) {
				Debug.log("No sequence selected");
				updateCurrentMacroDisplay("");
				return;
			}

			if (stopSequenceFlag) {
				currentIndex = 0; // Start from the beginning if stopped
				stopSequenceFlag = false; // Reset the stop flag
				pauseSequenceFlag = false;
			}
			else if (!isSequenceRunning && pauseSequenceFlag) {
				// Logic for resuming from a paused state
				pauseSequenceFlag = false;
			}
			else if (!isSequenceRunning) {
				// Starting a new sequence
				currentIndex = 0;
			}

			isSequenceRunning = true;
			updateRunButtonState();

			var keys = Object.keys(selectedSequence_);
			var totalMacros = keys.length;

			//======================
			function executeMacro() {
				Debug.log("executeMacro()", isSequenceRunning, currentIndex + 1, "of", totalMacros);
				if (stopSequenceFlag) {
					Debug.log("Sequence has been stopped.");
					updateCurrentMacroDisplay("Stopped", currentIndex, totalMacros);
					return;
				}

				if (pauseSequenceFlag) {
					Debug.log("Sequence has been paused.");
					updateCurrentMacroDisplay("Halted", currentIndex, totalMacros);
					isSequenceRunning = false;
					return;
				}

				if (currentIndex >= keys.length) {
					Debug.log("Done with sequence macro count", totalMacros);
					currentIndex = 0;
					updateCurrentMacroDisplay("Done", currentIndex, totalMacros);
					isSequenceRunning = false;
					updateRunButtonState();

					if (liveViewActive) {
						if (currentLiveViewTimeout !== null) {
							clearTimeout(currentLiveViewTimeout);
						}
						// Set up the sequence to restart after the live view interval
						currentLiveViewTimeout = setTimeout(function () {
							onClickRunSequence();
						}, intervalTime);
					}

					return;
				}

				var commandString = selectedSequence_[keys[currentIndex]];
				var command = JSON.parse(commandString);

				updateCurrentMacroDisplay(command["macroName"], currentIndex + 1, totalMacros);

				var postData = "inputArgs=" + command["inputArgs"] + "&outputArgs=" + command["outputArgs"];

				DesktopContent.XMLHttpRequest("Request?RequestType=runFEMacro" +
					"&feClassSelected=" + command["feClass"] +
					"&feUIDSelected=" + command["feUID"] +
					"&macroType=" + command["macroType"] +
					"&macroName=" + command["macroName"] +
					"&saveOutputs=" + parseInt(command["saveOutputs"]),
					postData,
					function (req, reqParam, errStr) {
						Debug.log("Sequence mode handleMacroResponse...", currentIndex + 1, "of", totalMacros);
						handleMacroResponse(req, reqParam, errStr);

						++currentIndex; //if pause, increment on resume

						//handleMacroResponse might force pause!

						Debug.logv({ pauseSequenceFlag });
						if (!pauseSequenceFlag)
							setTimeout(executeMacro, delayBetweenMacros); // Delay before executing next macro
						else {
							Debug.log("Flag triggered pause (do not delay)!");
							executeMacro(); //just to run same code
						}

					}, //end Sequence Mode exec command handler
					0 /*reqParam*/, 0 /*progressHandler*/,
					true /*callHandlerOnErr*/,
					true /*doNotShowLoadingOverlay*/
				);

				appendHistoryRecord(JSON.stringify(command));

			} //end executeMacro()

			executeMacro(); // Start executing macros with delay
		} //end onClickRunSequence()

		function updateCurrentMacroDisplay(macroName, currentIndex, totalMacros) {
			var displayElement = document.getElementById("currentMacroDisplay");

			if (displayElement) {
				var displayText;

				if (macroName === "Done") {
					displayText = "Done";
				}
				else if (macroName === "No Macro Running") {
					displayText = "No Macro Running";
				}
				else if (stopSequenceFlag) {
					displayText = "Halted";
				}
				else if (macroName === "Halted") {
					var haltedMacroIndex = Math.max(0, currentIndex - 1);
					var haltedMacroString = selectedSequence_[haltedMacroIndex];
					var haltedMacro = haltedMacroString ? JSON.parse(haltedMacroString) : null;
					var haltedMacroName = haltedMacro ? haltedMacro.macroName : "Unknown";

					displayText = "Paused: " + (haltedMacroIndex + 1) + "/" + totalMacros + " " + haltedMacroName;
				}
				else {
					displayText = currentIndex + "/" + totalMacros + " " + macroName;
				}

				displayElement.textContent = displayText;
			}
		} //end updateCurrentMacroDisplay()

			tempSequence_[index - 1] = tempValue;
			showSequence("sequence-builder", tempSequence_);
			Debug.log("up", tempSequence_);
			return;
		} //end moveUpSequence()

		function removeFromSequence(index) {
			delete tempSequence_[index]
			var i = 0;
			for (var key of Object.keys(tempSequence_)) {
				if (i != key) {
					tempSequence_[i] = tempSequence_[key];

					delete tempSequence_[key];
				}
				i++;
			}
			showSequence("sequence-builder", tempSequence_);
			Debug.log("remove", tempSequence_);
			return;
		} //end removeFromSequence()

			tempSequence_[index + 1] = tempValue;

			Debug.log("down", tempSequence_);

		//=====================================================================================
		//escapeHtml ~~
		//	escape html special characters, so text can safely go in innerHTML
		function escapeHtml(str) {
			return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
		} //end escapeHtml()

		//=====================================================================================
		//getDelayDisplayString ~~
		//	current live view delay as display string
		function getDelayDisplayString() {
			if (intervalTime === 0) return 'None';
			if (intervalTime > 0) return (intervalTime / 1000) + ' seconds';
			return '2 seconds'; //default, before user has set an interval
		} //end getDelayDisplayString()

		//=====================================================================================
		//getOperatorSymbol ~~
		function getOperatorSymbol(operator) {
			switch (operator) {
				case "eq": return "==";
				case "gt": return ">";
				case "gte": return ">=";
				case "lt": return "<";
				case "lte": return "<=";
				default: return "";
			}
		} //end getOperatorSymbol()

			const outputEl = document.getElementById("macroModule-output");
			const copyStr = outputEl.innerText; //use innerText to maintain new lines instead of textContent;
			navigator.clipboard.writeText(copyStr)
				.then(() => {
					const el = document.getElementById("copybtn");
					const original = el.src;

					DesktopContent.popUpVerification(
						"Execution text copied!", 0,
						0, "#efeaea", 0, "black",
						0, 0, 0, 0, 0, 0, 0, 0,
						true /* justDisplayAndTimeoutPopup */,
						2147483646 + 1 /* z-index on top of Debug popup */);

					el.src = "/WebPath/images/windowContentImages/loader-Settings.gif";

					setTimeout(() => {
						el.src = original;
					}, 500);
				})
				.catch(e => {
					Debug.err("Error in copying FE Macro output", e)
				});
		} //end copyOutput()

		// END SEQUENCE CONTROL
		//=====================================================================================


		//=====================================================================================
		//loadPlotly ~~
		//	lazy loading of plotly, only when needed for plots to avoid load time on body load
		function loadPlotly(callback) {
			if (window.Plotly) // Already loaded
			{
				Debug.log("Plotly already loaded");
				callback();
				return;
			}

			// Create script tag
			const script = document.createElement("script");
			script.src = "/WebPath/js/js_lib/plotly.min.js";  // pick version you need
			script.onload = callback;
			document.head.appendChild(script);
		} //end loadPlotly()

	</script>

</head>


<body onload='//init() called by DesktopContent.js'>

	<!-- <center> -->

	<a onclick="toggleView()">Toggle View</a>
	<a id="#macroModule-sequence" onclick="toggleSequenceMode(); DesktopContent.scrollIntoViewX('macroModule-sequence', false)">Sequence Mode</a><br>
	<div style='width:550px'></div>

	<!--<a onclick='init();'>Refresh</a>
		<br>-->

	<div id="popupClearHistoryConfirm" class="smallPopup">
		<h4>You will be clearing command history. Do you wish to continue?</h4>
		<div class="buttongroup">
			<center>
				<button onclick="clearHistory(this)">Yes, please</button>
				<button onclick="hideSmallPopup(this)">Cancel</button>
			</center>
		</div>
	</div>

	<div id="popupSetSequenceDelay" class="smallPopup">
		<center>
			<h4>Set Delay Between Macros (sec):</h4>
			<input type="number" id="sequenceDelayInput" min="0" maxlength="30" onkeypress="return handleEnterPressDelaySequence(event)"></input>
			<div class="buttongroup" style="margin-top: 20px;">
				<button onclick="delaySequence()">Confirm</button>
				<button onclick="hideSmallPopup(this)">Cancel</button>
		</center>
	</div>
	</div>

	<div id="popupSetInterval" class="smallPopup">
		<center>
			<h4>Please enter the interval time (sec):</h4>
			<input type="number" id="intervalTime" value="2" onkeypress="return handleEnterPress(event)">
			<div>
				<input type="checkbox" id="noDelayCheckbox" style="margin-top: 20px; cursor: pointer;">
				<label for="noDelayCheckbox" style="cursor: pointer;">No Delay</label>
			</div>
			<div class="buttongroup" style="margin-top: 20px;">
				<button onclick="setIntervalAndStart()">Set Interval</button>
				<button onclick="hideSmallPopupLiveView(this)">Cancel</button>
			</div>
		</center>
	</div>

	<div id="popupFlagAlert" class="smallPopup" style="display: none;">
		<center>
			<h4 id="flagPopupPrompt">Please enter a keyword to flag:</h4>
			<div style="display: flex; align-items: center; justify-content: center;">
				<input type="text" id="flagCompareLabel" placeholder="Label"
					style="display: none; width: 155px; margin-top: 5px; margin-right: 10px;" />
				<select id="comparisonOperator" onchange="handleComparisonOperatorChange()"
					style="margin-top: 5px; height: 30px; margin-right: 10px;"
					title="'Contains' does a plain text search of the keyword in the macro output. The numeric operators compare against value(s) in the output following the label and a '|' ':' or '=' separator (e.g. 'Label | 25.0' or 'Label: 1, 2, 3'), or in '( label ) value' form (e.g. '(0) 0xbd00'). Values may be decimal or hex (0x...).">
					<option value="none">Contains</option>
					<option value="eq">==</option>
					<option value="gt">&gt;</option>
					<option value="gte">&gt;=</option>
					<option value="lt">&lt;</option>
					<option value="lte">&lt;=</option>
				</select>
				<input type="text" id="flagKeyword" placeholder="Keyword" value="" style="margin-top: 5px;" />
				<input type="text" id="flagCompareNumber" placeholder="Number"
					title="Number to compare against; decimal or hex (e.g. 0xbd00)"
					style="display: none; width: 90px; margin-top: 5px;" />
			</div>
			<div style="margin-top: 10px;">
				<input type="checkbox" id="flagLoudAlarmCheckbox" style="cursor: pointer;"
					title="When checked, the loud Desktop system message alarm sound will play when the flag is triggered.">
				<label for="flagLoudAlarmCheckbox" style="cursor: pointer;">Loud alarm sound on trigger</label>
			</div>
			<div class="buttongroup" style="margin-top: 20px;">
				<button onclick="setFlagKeyword(true)">Flag if Present</button>
				<button onclick="setFlagKeyword(false)">Flag if Absent</button>
				<div style="margin-top: 10px;">
					<button onclick="hideSmallPopupFlag(this)">Cancel</button>
				</div>
			</div>
		</center>
	</div>

	<div id="popupKeywordMatch" class="smallPopup" style="display: none;">
		<center>
			<h4 id="matchMessage">Keyword matched!</h4>
			<div class="buttongroup" style="margin-top: 20px;">
				<button onclick="hideSmallPopup(this)">Close</button>
			</div>
		</center>
	</div>

	<div id="popupSaveSequence" class="smallPopup">
		<center>
			<h4>Type a name for the sequence</h4>
			<input type="text" id="sequenceName" maxlength="30" onkeypress="return handleEnterPressSaveSequence(event)"></input>
			<span id="sequenceName-error" style="color: red; display: block; margin-top: 10px;"></span>
			<div class="buttongroup" style="margin-top: 10px;">
				<button onclick="saveSequence()">Confirm</button>
				<button onclick="hideSmallPopup(this)">Cancel</button>
		</center>
	</div>
	</div>

	<div id='display'></div>
	<!-- </center> -->
</body>

</html>
